name: QuitCue
options:
  bundleIdPrefix: com.quitcue
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.3"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      GCC_PREPROCESSOR_DEFINITIONS: DEBUG=1
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  QuitCue:
    type: application
    platform: macOS
    sources:
      - path: QuitCue
        excludes:
          - "Resources/Info.plist"
          - "QuitCue.entitlements"
    info:
      path: QuitCue/Resources/Info.plist
      properties:
        CFBundleName: QuitCue
        CFBundleDisplayName: QuitCue
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: com.quitcue.QuitCue
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: false
        NSHumanReadableCopyright: "© 2026 QuitCue"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    entitlements:
      path: QuitCue/QuitCue.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: QuitCue/QuitCue.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.quitcue.QuitCue
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: QuitCue/Resources/Info.plist
        ENABLE_PREVIEWS: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: QuitCue

  QuitCueTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - QuitCueTests
    dependencies:
      - target: QuitCue
        link: false
        copy: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.quitcue.QuitCueTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/QuitCue.app/Contents/MacOS/QuitCue

  QuitCueUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - QuitCueUITests
    dependencies:
      - target: QuitCue
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.quitcue.QuitCueUITests
        TEST_TARGET_NAME: QuitCue

schemes:
  QuitCue:
    build:
      targets:
        QuitCue: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuitCueTests
        - QuitCueUITests
    profile:
      config: Release
    archive:
      config: Release
